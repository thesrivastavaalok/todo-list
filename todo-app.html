<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do App | Alok Kumar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 32px;
      width: 420px;
      box-shadow: 0 8px 32px rgba(80,100,200,0.12);
    }
    h1 {
      font-size: 24px;
      color: #3b4cca;
      margin-bottom: 6px;
    }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e4ff;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    input[type="text"]:focus { border-color: #3b4cca; }
    button.add-btn {
      background: #3b4cca;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.add-btn:hover { background: #2d3aaa; }
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .filters button {
      background: #f0f4ff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #555;
      transition: all 0.2s;
    }
    .filters button.active {
      background: #3b4cca;
      color: white;
    }
    ul { list-style: none; }
    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; } }
    li span {
      flex: 1;
      font-size: 14px;
      color: #333;
    }
    li span.done {
      text-decoration: line-through;
      color: #aaa;
    }
    li input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: #3b4cca;
      cursor: pointer;
    }
    .del-btn {
      background: none;
      border: none;
      color: #e57373;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .del-btn:hover { background: #fce4e4; }
    .empty { text-align: center; color: #bbb; font-size: 13px; padding: 24px 0; }
    .footer { margin-top: 16px; font-size: 12px; color: #aaa; text-align: right; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 To-Do App</h1>
    <p class="subtitle">Stay organized, one task at a time.</p>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      <button class="add-btn" onclick="addTask()">Add</button>
    </div>
    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">All</button>
      <button onclick="setFilter('active', this)">Active</button>
      <button onclick="setFilter('done', this)">Done</button>
    </div>
    <ul id="taskList"></ul>
    <div class="footer" id="countDisplay"></div>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let filter = 'all';

    function saveTasks() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      tasks.push({ id: Date.now(), text, done: false });
      input.value = '';
      saveTasks();
      render();
    }

    function toggleTask(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
      saveTasks();
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('taskList');
      const filtered = tasks.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">No tasks here!</div>';
      } else {
        list.innerHTML = filtered.map(t => `
          <li>
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})" />
            <span class="${t.done ? 'done' : ''}">${t.text}</span>
            <button class="del-btn" onclick="deleteTask(${t.id})">✕</button>
          </li>
        `).join('');
      }
      const done = tasks.filter(t => t.done).length;
      document.getElementById('countDisplay').textContent =
        `${done} / ${tasks.length} tasks completed`;
    }

    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
